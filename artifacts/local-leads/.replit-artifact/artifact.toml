kind = "web"
previewPath = "/"
title = "Local Leads"
version = "1.0.0"
id = "artifacts/local-leads"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18369

[services.development]
run = "pnpm --filter @workspace/local-leads run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/local-leads", "run", "build" ]
publicDir = "artifacts/local-leads/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18369"
BASE_PATH = "/"
